name: Server CI

on:
    push:
        branches:
            - main
        paths:
            - 'server/**'
    pull_request:
        branches:
            - main
        paths:
            - 'server/**'

jobs:
    # ─── Job 1: Build, Lint & Test ─────────────────────────────────────────────
    build-test:
        name: Build, Lint & Test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '24'
                  cache: 'npm'
                  cache-dependency-path: server/package-lock.json

            - name: Install Dependencies
              working-directory: server
              run: npm ci --frozen-lockfile

            # ── Lint: run ESLint ─────────────────────────────────────────────
            - name: Run ESLint
              working-directory: server
              run: npm run lint

            # ── Test ─────────────────────────────────────────────────────────
            - name: Run Tests
              working-directory: server
              run: npm test --if-present

    # ─── Job 2: Docker Build, Tag & Push ───────────────────────────────────────
    docker-build-push:
        name: Docker Build & Push
        runs-on: ubuntu-latest
        needs: build-test

        # Only push on direct pushes to main (not on PRs)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

        permissions:
            contents: write   # needed to push the version tag back to the repo

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0    # full history so we can push tags

            # ── Read the current version from package.json ────────────────────
            - name: Read package version
              id: pkg
              working-directory: server
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "Detected version: $VERSION"

            # ── Docker Buildx (multi-platform support) ────────────────────────
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            # ── Login to Docker Hub ───────────────────────────────────────────
            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            # ── Extract metadata (tags & labels) ─────────────────────────────
            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ secrets.DOCKER_USERNAME }}/ai-saas-server
                  tags: |
                      # Semver tag from package.json  e.g.  1.0.0
                      type=raw,value=${{ steps.pkg.outputs.version }}
                      # Short Git SHA  e.g.  sha-a1b2c3d
                      type=sha,prefix=sha-,format=short
                      # Always update :latest on main
                      type=raw,value=latest,enable={{is_default_branch}}

            # ── Build & Push (with layer cache) ──────────────────────────────
            - name: Build and Push Docker Image
              uses: docker/build-push-action@v6
              with:
                  context: server
                  file: server/Dockerfile
                  push: true
                  platforms: linux/amd64,linux/arm64
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            # ── Bump patch version in package.json & push a Git tag ──────────
            - name: Bump version & push Git tag
              working-directory: server
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  git config user.name  "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  OLD_VERSION="${{ steps.pkg.outputs.version }}"

                  # Bump patch: 1.0.0 → 1.0.1
                  npm version patch --no-git-tag-version
                  NEW_VERSION=$(node -p "require('./package.json').version")

                  git add package.json package-lock.json
                  git commit -m "chore(release): bump server version $OLD_VERSION → $NEW_VERSION [skip ci]"
                  git tag "server-v$NEW_VERSION"
                  git push origin main --follow-tags